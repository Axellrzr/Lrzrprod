<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — LRZR Production</title>
  <meta name="description" content="Portfolio photo de LRZR Production — Portraits, Wildlife, Street, Automobile, Produit." />
  <link rel="canonical" href="https://axellrzr.github.io/galerie.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="galerie-page">

  <!-- NAVIGATION -->
  <header class="site-header scrolled" id="top">
    <nav class="nav" aria-label="Navigation principale">
      <a href="index.html" class="nav__logo">LRZR<span class="nav__logo-accent">.</span></a>
      <button class="nav__burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links" id="nav-links" role="list">
        <li><a href="index.html#about">À propos</a></li>
        <li><a href="galerie.html" class="active">Portfolio</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#contact" class="nav__cta">Me contacter</a></li>
      </ul>
    </nav>
  </header>

  <main class="galerie-main">

    <!-- En-tête page galerie -->
    <div class="galerie-header">
      <div class="container">
        <p class="section-label">Portfolio</p>
        <h1 class="galerie-title">Mes travaux</h1>
      </div>
    </div>

    <!-- ============================================================
         VUE CATÉGORIES (affichée par défaut)
         Cliquer sur une catégorie → affiche ses photos
         ============================================================ -->
    <section class="galerie-cats" id="galerie-cats" aria-label="Catégories">
      <div class="container">
        <div class="cats-grid" id="cats-grid">
          <!-- Injecté par JS depuis CATEGORIES dans main.js -->
        </div>
      </div>
    </section>

    <!-- ============================================================
         VUE PHOTOS D'UNE CATÉGORIE (masquée par défaut)
         ============================================================ -->
    <section class="galerie-photos" id="galerie-photos" aria-label="Photos" hidden>
      <div class="container">
        <div class="galerie-photos__header">
          <button class="back-btn" id="back-btn" aria-label="Retour aux catégories">
            ← Retour
          </button>
          <h2 class="galerie-photos__title" id="galerie-photos-title"></h2>
        </div>
        <div class="photos-grid" id="photos-grid">
          <!-- Injecté par JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualisation image" hidden>
    <button class="lightbox__close" aria-label="Fermer">&times;</button>
    <button class="lightbox__prev" aria-label="Image précédente">&#8592;</button>
    <button class="lightbox__next" aria-label="Image suivante">&#8594;</button>
    <div class="lightbox__content">
      <img class="lightbox__img" src="" alt="" />
      <p class="lightbox__caption"></p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer__inner">
        <a href="index.html" class="footer__logo">LRZR<span>.</span></a>
        <nav class="footer__nav">
          <a href="index.html#about">À propos</a>
          <a href="galerie.html">Portfolio</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#contact">Contact</a>
        </nav>
        <div class="footer__socials">
          <a href="https://www.instagram.com/axellrzr" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://www.youtube.com/@axelluimeme" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22.54 6.42A2.78 2.78 0 0 0 20.6 4.47C18.88 4 12 4 12 4s-6.88 0-8.6.47a2.78 2.78 0 0 0-1.95 1.95C1 8.14 1 12 1 12s0 3.86.45 5.58a2.78 2.78 0 0 0 1.95 1.95C5.12 20 12 20 12 20s6.88 0 8.6-.47a2.78 2.78 0 0 0 1.95-1.95C23 15.86 23 12 23 12s0-3.86-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="mailto:contact@lrzrprod.com" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </a>
        </div>
      </div>
      <div class="footer__bottom">
        <p>copy; <span id="footer-year"></span> LRZR Production — Tous droits réservés</p>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
